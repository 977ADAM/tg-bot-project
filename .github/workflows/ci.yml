name: Deploy Yandex Cloud Function

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

env:
  FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
  SA_ID: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
  FUNCTION_NAME: my-python-function
  FUNCTION_RUNTIME: python312
  FUNCTION_ENTRYPOINT: index.handler
  FUNCTION_MEMORY: "128mb"
  FUNCTION_SOURCEROOT: .

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Debug OIDC claims
        shell: bash
        run: |
          resp=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://github.com/${{ github.repository_owner }}")
          token=$(echo "$resp" | jq -r '.value')
          payload=$(echo "$token" | cut -d '.' -f2 | tr '_-' '/+' | base64 -d 2>/dev/null || true)
          echo "$payload" | jq '{iss,aud,sub,repository,repository_owner,ref,environment}'

      - name: Deploy function
        id: sls-func
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-id: ${{ env.SA_ID }}
          folder-id: ${{ env.FOLDER_ID }}
          function-name: ${{ env.FUNCTION_NAME }}
          runtime: ${{ env.FUNCTION_RUNTIME }}
          entrypoint: ${{ env.FUNCTION_ENTRYPOINT }}
          memory: ${{ env.FUNCTION_MEMORY }}
          source-root: ${{ env.FUNCTION_SOURCEROOT }}
          include: |
            **/*.py
            requirements.txt