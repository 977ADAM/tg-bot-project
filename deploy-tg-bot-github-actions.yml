name: Deploy TG bot to Yandex Cloud Functions

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bot_username:
        description: Telegram bot username without _bot
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-tg-bot-${{ github.ref }}
  cancel-in-progress: true

env:
  YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
  YC_SA_ID: ${{ vars.YC_SA_ID }}
  YC_FUNCTION_RUNTIME: python314
  YC_FUNCTION_ENTRYPOINT: main.handler

jobs:
  deploy:
    name: Deploy function
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'test') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve bot name
        id: bot
        shell: bash
        env:
          BOT_USERNAME_INPUT: ${{ inputs.bot_username }}
          BOT_USERNAME_VAR: ${{ vars.BOT_USERNAME }}
        run: |
          BOT_USERNAME="${BOT_USERNAME_INPUT:-$BOT_USERNAME_VAR}"

          if [[ -z "$BOT_USERNAME" ]]; then
            echo "Set workflow_dispatch input 'bot_username' or repository variable 'BOT_USERNAME'." >&2
            exit 1
          fi

          FUNCTION_NAME="$(echo "$BOT_USERNAME" | tr '[:upper:]' '[:lower:]' | tr -d '_')"

          echo "bot_username=$BOT_USERNAME" >> "$GITHUB_OUTPUT"
          echo "function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to Yandex Cloud Functions
        id: deploy
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-id: ${{ env.YC_SA_ID }}
          folder-id: ${{ env.YC_FOLDER_ID }}
          function-name: ${{ steps.bot.outputs.function_name }}
          runtime: ${{ env.YC_FUNCTION_RUNTIME }}
          entrypoint: ${{ env.YC_FUNCTION_ENTRYPOINT }}
          include: |
            ./src
          environment: |
            BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Deployment complete"
            echo ""
            echo "- Bot username: ${{ steps.bot.outputs.bot_username }}"
            echo "- Function name: ${{ steps.bot.outputs.function_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # Optional: if you later decide to automate Telegram webhook setup,
      # add a step here that reads the public function URL and calls:
      # https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/setWebhook?url=<FUNCTION_URL>
